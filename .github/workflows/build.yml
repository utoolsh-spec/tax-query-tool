name: Build Windows EXE

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install ddddocr requests

    - name: Build EXE
      run: |
        pyinstaller --onefile --windowed --collect-data ddddocr --collect-all ddddocr main.py

    - name: Rename and check
      run: |
        ls dist/
        Rename-Item -Path "dist/main.exe" -NewName "dist/TaxQueryTool.exe" -ErrorAction SilentlyContinue
        ls dist/

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: TaxQueryTool-Windows
        path: dist/*.exe

    - name: Create Release
      uses: softprops/action-gh-release@v1
      if: success()
      with:
        tag_name: v1.0.${{ github.run_number }}
        name: TaxQueryTool-v1.0.${{ github.run_number }}
        files: dist/TaxQueryTool.exe
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
